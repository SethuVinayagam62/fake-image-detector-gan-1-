<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckAI — Scan History</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#04060d;--panel:rgba(12,18,32,0.85);--border:rgba(40,60,100,0.4);--border-hi:rgba(123,47,255,0.3);--cyan:#00c8ff;--violet:#7b2fff;--emerald:#00ffa3;--rose:#ff3d6e;--amber:#ffaa00;--text:#ccd6f6;--text-dim:#5a7090;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(123,47,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(123,47,255,0.03) 1px,transparent 1px);background-size:48px 48px;}
.bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(123,47,255,0.07) 0%,transparent 70%);top:-100px;right:-100px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,255,0.05) 0%,transparent 70%);bottom:-100px;left:-100px;}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(4,6,13,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
nav::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--violet),var(--cyan),transparent);opacity:.5;}
.nav-logo{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:white;display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);box-shadow:0 0 10px var(--violet);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{font-size:.82rem;font-weight:500;color:var(--text-dim);padding:7px 14px;border-radius:6px;text-decoration:none;transition:all .2s;border:1px solid transparent;}
.nav-link:hover{color:var(--cyan);border-color:rgba(0,200,255,.3);background:rgba(0,200,255,.06);}
.nav-link.active{color:var(--violet);border-color:var(--border-hi);background:rgba(123,47,255,.07);}

.page-hero{position:relative;z-index:1;padding:50px 40px 30px;}
.page-hero h1{font-family:'Orbitron',monospace;font-size:2rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-hero p{font-size:.88rem;color:var(--text-dim);margin-top:6px;}

.wrapper{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 40px 80px;}

/* FILTERS */
.filters-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.filter-btn{font-size:.78rem;font-weight:600;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif;}
.filter-btn:hover,.filter-btn.active{color:var(--violet);border-color:var(--border-hi);background:rgba(123,47,255,.07);}
.search-box{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.82rem;width:200px;}
.search-box input::placeholder{color:var(--text-dim);}
.export-btn{font-size:.78rem;font-weight:600;padding:8px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--violet),var(--cyan));color:white;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:opacity .2s;}
.export-btn:hover{opacity:.85;}

/* HISTORY GRID */
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.history-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;transition:all .3s;position:relative;overflow:hidden;}
.history-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--card-color,var(--cyan));}
.history-card:hover{transform:translateY(-4px);border-color:var(--card-color,var(--cyan));box-shadow:0 16px 40px rgba(0,0,0,.5);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.card-filename{font-family:'Fira Code',monospace;font-size:.78rem;color:white;font-weight:500;word-break:break-all;padding-right:10px;}
.verdict-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700;white-space:nowrap;}
.pill-real{background:rgba(0,255,163,.1);color:var(--emerald);border:1px solid rgba(0,255,163,.25);}
.pill-fake{background:rgba(255,61,110,.1);color:var(--rose);border:1px solid rgba(255,61,110,.25);}
.pill-sus{background:rgba(255,170,0,.1);color:var(--amber);border:1px solid rgba(255,170,0,.25);}
.card-score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.big-score{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:var(--card-color,var(--cyan));}
.score-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:3px;background:var(--card-color,var(--cyan));box-shadow:0 0 8px var(--card-color,var(--cyan));}
.card-meta{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-dim);font-family:'Fira Code',monospace;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:var(--text-dim);}
.empty-state .empty-icon{font-size:3rem;margin-bottom:16px;opacity:.4;}
.empty-state h3{font-size:1rem;color:white;margin-bottom:8px;}
.empty-state p{font-size:.85rem;}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:32px;}
.page-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Space Grotesk',sans-serif;}
.page-btn:hover,.page-btn.active{color:var(--violet);border-color:var(--border-hi);background:rgba(123,47,255,.07);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.history-card{animation:fadeUp .4s ease both;}

footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--text-dim);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<nav>
  <a href="/" class="nav-logo"><div class="dot"></div>CHECK<span style="color:var(--cyan)">AI</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <a href="/history" class="nav-link active">History</a>
    <a href="/batch" class="nav-link">Batch Scan</a>
    <a href="/cybersecurity" class="nav-link">Cyber Security</a>
    <a href="/about" class="nav-link">About</a>
  </div>
</nav>

<div class="page-hero">
  <h1>🕰️ Scan History</h1>
  <p>Browse all past scan results with verdicts, timestamps, and AI influence scores</p>
</div>

<div class="wrapper">
  <div class="filters-bar">
    <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
    <button class="filter-btn" onclick="filterCards('real',this)">✅ Real</button>
    <button class="filter-btn" onclick="filterCards('fake',this)">❌ Fake</button>
    <button class="filter-btn" onclick="filterCards('sus',this)">⚠️ Suspicious</button>
    <div class="search-box">
      <span style="color:var(--text-dim)">🔍</span>
      <input type="text" placeholder="Search filename..." oninput="searchCards(this.value)">
    </div>
    <button class="export-btn" onclick="exportCSV()">↓ Export CSV</button>
  </div>

  <div class="history-grid" id="history-grid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  <div style="font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;color:white;">CHECK<span style="color:var(--cyan)">AI</span></div>
  <div>Built with MesoNet · TensorFlow · OpenCV · Flask</div>
  <div style="font-family:'Fira Code',monospace">v2.0.0 · 2025</div>
</footer>

<script>
// Demo scan history data
const allScans = [
  {name:'portrait_001.jpg',type:'Image',score:88,verdict:'fake',time:'Today, 14:32'},
  {name:'selfie_raw.png',type:'Image',score:9,verdict:'real',time:'Today, 14:18'},
  {name:'video_clip.mp4',type:'Video',score:73,verdict:'fake',time:'Today, 13:55'},
  {name:'id_photo.webp',type:'Image',score:6,verdict:'real',time:'Today, 13:20'},
  {name:'news_face.jpg',type:'Image',score:52,verdict:'sus',time:'Today, 12:44'},
  {name:'meeting_rec.mp4',type:'Video',score:91,verdict:'fake',time:'Today, 11:30'},
  {name:'headshot_pro.jpg',type:'Image',score:15,verdict:'real',time:'Yesterday, 18:02'},
  {name:'deepfake_test.mp4',type:'Video',score:96,verdict:'fake',time:'Yesterday, 16:45'},
  {name:'family_photo.png',type:'Image',score:4,verdict:'real',time:'Yesterday, 15:10'},
  {name:'celebrity_fake.jpg',type:'Image',score:84,verdict:'fake',time:'Yesterday, 14:22'},
  {name:'passport_scan.jpg',type:'Image',score:11,verdict:'real',time:'Yesterday, 12:05'},
  {name:'social_profile.webp',type:'Image',score:48,verdict:'sus',time:'Mar 11, 09:33'},
  {name:'interview_clip.mp4',type:'Video',score:67,verdict:'fake',time:'Mar 11, 08:14'},
  {name:'raw_photo.jpg',type:'Image',score:7,verdict:'real',time:'Mar 10, 20:45'},
  {name:'ai_face_test.png',type:'Image',score:99,verdict:'fake',time:'Mar 10, 17:22'},
  {name:'conference.mp4',type:'Video',score:38,verdict:'sus',time:'Mar 10, 15:00'},
];

let currentFilter = 'all';
let currentSearch = '';
let currentPage = 1;
const PER_PAGE = 9;

function getColor(verdict) {
  return verdict==='real'?'var(--emerald)':verdict==='fake'?'var(--rose)':'var(--amber)';
}
function getPillClass(verdict) {
  return verdict==='real'?'pill-real':verdict==='fake'?'pill-fake':'pill-sus';
}
function getPillText(verdict) {
  return verdict==='real'?'✅ Real':verdict==='fake'?'❌ Fake':'⚠ Suspicious';
}

function render() {
  let filtered = allScans.filter(s => {
    const matchFilter = currentFilter==='all' || s.verdict===currentFilter;
    const matchSearch = s.name.toLowerCase().includes(currentSearch.toLowerCase());
    return matchFilter && matchSearch;
  });

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const paged = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  const grid = document.getElementById('history-grid');
  if (paged.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📂</div><h3>No scans found</h3><p>Try a different filter or upload a file from the home page.</p></div>`;
  } else {
    grid.innerHTML = paged.map((s, i) => `
      <div class="history-card" style="--card-color:${getColor(s.verdict)};animation-delay:${i*0.05}s">
        <div class="card-top">
          <div class="card-filename">${s.name}</div>
          <span class="verdict-pill ${getPillClass(s.verdict)}">${getPillText(s.verdict)}</span>
        </div>
        <div class="card-score-row">
          <div class="big-score">${s.score}%</div>
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        </div>
        <div class="card-meta">
          <span>${s.type}</span>
          <span>${s.time}</span>
        </div>
      </div>`).join('');
  }

  // Pagination
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  for (let p = 1; p <= totalPages; p++) {
    pag.innerHTML += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
}

function filterCards(f, btn) {
  currentFilter = f;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function searchCards(val) {
  currentSearch = val;
  currentPage = 1;
  render();
}

function goPage(p) {
  currentPage = p;
  render();
}

function exportCSV() {
  let csv = 'Filename,Type,AI Score,Verdict,Time\n';
  allScans.forEach(s => { csv += `${s.name},${s.type},${s.score}%,${s.verdict},${s.time}\n`; });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'checkai_history.csv';
  a.click();
}

render();
</script>
</body>
</html>
